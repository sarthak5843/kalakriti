# Server
server.port=${PORT:5000}

# Database - Neon PostgreSQL (free forever)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-weathered-salad-aomvhy2q.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:npg_hBX09ULKdeQY}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool - tuned for Neon serverless PostgreSQL
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.initialization-fail-timeout=60000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:kalakriti_secret_key_must_be_at_least_32_characters_long_for_security}
jwt.expiration=86400000

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:YOUR_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY:YOUR_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:YOUR_API_SECRET}

# File upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://kalakriti-hazel.vercel.app}
